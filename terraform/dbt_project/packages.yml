# =============================================================================
# packages.yml - dbt パッケージ依存定義
# =============================================================================
# インストール: dbt deps
# =============================================================================

packages:
  # dbt-utils: ユーティリティマクロ集
  # accepted_range, expression_is_true, unique_combination_of_columns 等を使用
  - package: dbt-labs/dbt_utils
    version: [">=1.1.0", "<2.0.0"]

  # dbt-synapse: Azure Synapse Analytics アダプタ
  # Serverless SQL Pool 向けの materialization 等を提供
  - package: dbt-msft/dbt_synapse_utils
    version: [">=0.2.0", "<1.0.0"]
