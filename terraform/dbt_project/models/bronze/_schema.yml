# =============================================================================
# Bronze 層 ソーステスト定義
# =============================================================================
# SharePoint Online から取り込まれた生データのソース定義と基本的な品質テスト。
# Bronze 層ではデータの中身は変更せず、取り込みの完全性を検証する。
# =============================================================================

version: 2

sources:
  - name: bronze_adls
    description: >
      ADLS Gen2 上の Bronze 層 Parquet ファイル。
      ADF パイプライン（spo_to_bronze）が日次で SharePoint Online から取り込む。
    meta:
      owner: "data-engineering"
      source_system: "sharepoint_online"
    freshness:
      warn_after:
        count: 24
        period: hour
      error_after:
        count: 28
        period: hour
    loaded_at_field: _ingestion_timestamp

    tables:
      - name: brz_estimates
        description: "見積管理リスト（Bronze 生データ）"
        columns:
          - name: estimate_number
            description: "見積番号（ソース主キー）"
            tests:
              - not_null:
                  severity: error
                  config:
                    where: "_ingestion_date = CAST(GETDATE() AS DATE)"

      - name: brz_projects
        description: "案件管理リスト（Bronze 生データ）"
        columns:
          - name: project_number
            description: "案件番号（ソース主キー）"
            tests:
              - not_null:
                  severity: error
                  config:
                    where: "_ingestion_date = CAST(GETDATE() AS DATE)"

      - name: brz_customers
        description: "顧客マスタリスト（Bronze 生データ）"
        columns:
          - name: customer_code
            description: "顧客コード（ソース主キー）"
            tests:
              - not_null:
                  severity: error
                  config:
                    where: "_ingestion_date = CAST(GETDATE() AS DATE)"

      - name: brz_employees
        description: "担当者マスタリスト（Bronze 生データ）"
        columns:
          - name: employee_number
            description: "社員番号（ソース主キー）"
            tests:
              - not_null:
                  severity: error
                  config:
                    where: "_ingestion_date = CAST(GETDATE() AS DATE)"

models:
  - name: brz_estimates
    description: >
      見積管理リスト Bronze 層ビュー。
      ADLS Gen2 の Parquet ファイルを OPENROWSET 経由で参照。
      パーティション（year/month/day）の最新データを返す。
    columns:
      - name: estimate_number
        description: "見積番号（ソース主キー。SharePoint リストの Title 相当）"
        tests:
          - not_null
      - name: customer_name
        description: "顧客名（ソースのまま。NULL やトリム未済の可能性あり）"
      - name: amount
        description: "金額（文字列。Silver 層で DECIMAL に型変換）"
      - name: status
        description: "ステータス（ソースのまま。Silver 層で正規化）"
      - name: _ingestion_timestamp
        description: "取り込み実行日時（UTC）"
        tests:
          - not_null

  - name: brz_projects
    description: >
      案件管理リスト Bronze 層ビュー。
    columns:
      - name: project_number
        description: "案件番号（ソース主キー）"
        tests:
          - not_null
      - name: _ingestion_timestamp
        description: "取り込み実行日時（UTC）"
        tests:
          - not_null

  - name: brz_customers
    description: >
      顧客マスタ Bronze 層ビュー。
    columns:
      - name: customer_code
        description: "顧客コード（ソース主キー）"
        tests:
          - not_null
      - name: _ingestion_timestamp
        description: "取り込み実行日時（UTC）"
        tests:
          - not_null

  - name: brz_employees
    description: >
      担当者マスタ Bronze 層ビュー。
    columns:
      - name: employee_number
        description: "社員番号（ソース主キー）"
        tests:
          - not_null
      - name: _ingestion_timestamp
        description: "取り込み実行日時（UTC）"
        tests:
          - not_null
