AWSTemplateFormatVersion: "2010-09-09"
Description: >
  EC サーバーレスバックエンド (dry-run v2). Route 53 + CloudFront + S3 静的サイト,
  API Gateway + Lambda + DynamoDB, Cognito 認証, SQS/SNS による非同期注文処理,
  CloudWatch 監視, Lambda 実行用 IAM Role を含む小売 EC 参照構成.

Parameters:
  EnvName:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: 環境名 (dev / prod)
  DomainName:
    Type: String
    Default: shop.example.com
    Description: 公開ドメイン名 (Route 53 ホストゾーン用) # TODO: 実ドメインに変更

Resources:
  # ===== Edge / 配信 =====
  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ec-${EnvName}-static-site"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms

  ProductImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ec-${EnvName}-product-images"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "ec-${EnvName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: static-site-origin
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: product-image-origin
            DomainName: !GetAtt ProductImageBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: static-site-origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
        CacheBehaviors:
          - PathPattern: /images/*
            TargetOriginId: product-image-origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        ViewerCertificate:
          CloudFrontDefaultCertificate: true  # TODO: ACM 証明書 ARN に差し替え

  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  AliasRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront 固定 HostedZoneId

  # ===== 認証 =====
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "ec-${EnvName}-user-pool"
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "ec-${EnvName}-web-client"
      GenerateSecret: false
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]

  # ===== Database =====
  AppTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ec-${EnvName}-app"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # ===== 非同期 / 通知 =====
  OrderQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ec-${EnvName}-order-queue"
      VisibilityTimeout: 60
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OrderDLQ.Arn
        maxReceiveCount: 5

  OrderDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ec-${EnvName}-order-dlq"
      KmsMasterKeyId: alias/aws/sqs

  OrderConfirmedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "ec-${EnvName}-order-confirmed"
      KmsMasterKeyId: alias/aws/sns

  # ===== IAM (Lambda 実行ロール: 最小権限) =====
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ec-${EnvName}-lambda-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: app-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource: !GetAtt AppTable.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt OrderQueue.Arn
                  - !GetAtt OrderDLQ.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref OrderConfirmedTopic

  # ===== Compute (同期 API Lambda) =====
  ApiLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "ec-${EnvName}-api"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          ORDER_QUEUE_URL: !Ref OrderQueue
      Code:
        ZipFile: |
          // TODO: 商品/注文 API 実装に差し替え
          exports.handler = async () => ({ statusCode: 200, body: "ok" });

  # ===== Compute (非同期 worker Lambda) =====
  OrderWorkerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "ec-${EnvName}-order-worker"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          TABLE_NAME: !Ref AppTable
          TOPIC_ARN: !Ref OrderConfirmedTopic
      Code:
        ZipFile: |
          // TODO: 注文確定の非同期処理に差し替え
          exports.handler = async () => ({ statusCode: 200 });

  OrderWorkerEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderQueue.Arn
      FunctionName: !Ref OrderWorkerLambda
      BatchSize: 10

  # ===== API Gateway (Cognito オーソライザ) =====
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "ec-${EnvName}-api"
      EndpointConfiguration:
        Types: [REGIONAL]

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: cognito-authorizer
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt UserPool.Arn

  # ===== 監視 =====
  ApiErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "ec-${EnvName}-api-5xx"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  CloudFrontDomain:
    Description: CloudFront 配信ドメイン
    Value: !GetAtt CloudFrontDistribution.DomainName
  ApiEndpoint:
    Description: API Gateway エンドポイント
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com"
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref UserPool
  AppTableName:
    Description: DynamoDB テーブル名
    Value: !Ref AppTable
